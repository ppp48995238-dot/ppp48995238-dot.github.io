<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Forex Market | 환율</title>
</head>
<body>
    <div class="header">
        <h1>FOREX TERMINAL</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
        <a href="forex.html" class="tab-link">환율</a>
        <a href="sentiment.html" class="tab-link">공포지수</a>
        <a href="global.html" class="tab-link">세계지수</a>
        <a href="analysis.html" class="tab-link">종목진단</a>
        <a href="predict.html" class="tab-link">예측시장</a>
        <a href="calculator.html" class="tab-link">퀀트계산기</a>
    </div>

    <div class="dashboard">
        <div class="card" style="grid-column: span 2;">
            <h2>💱 주요 통화 쌍 실시간 환율</h2>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-forex-cross-rates.js" async>
                {
                    "currencies": ["EUR", "USD", "JPY", "GBP", "CHF", "AUD", "CAD", "NZD", "KRW"],
                    "isTransparent": false,
                    "colorTheme": "dark",
                    "width": "100%",
                    "height": "600",
                    "locale": "kr"
                }
                </script>
            </div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h2>🗺️ 환율 강세/약세 히트맵</h2>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-forex-heat-map.js" async>
                {
                    "currencies": ["EUR", "USD", "JPY", "GBP", "CHF", "AUD", "CAD", "NZD", "KRW"],
                    "isTransparent": false,
                    "colorTheme": "dark",
                    "width": "100%",
                    "height": "600",
                    "locale": "kr"
                }
                </script>
            </div>
        </div>
    </div>
