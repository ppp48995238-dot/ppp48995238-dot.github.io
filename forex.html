<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forex Markets - GlobalEdge</title>
  <meta name="description" content="Real-time forex charts, news, and sentiment indicators">
  <link rel="stylesheet" href="style.css">
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
  <header>
    <h1>💱 Forex Markets</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="crypto.html">Crypto</a>
      <a href="market.html">Markets</a>
      <a href="predict.html">Predict</a>
      <a href="sentiment.html">Sentiment</a>
      <a href="news.html">News</a>
      <a href="global.html">Global</a>
      <a href="analysis.html">Analysis</a>
      <a href="calculator.html">Calculator</a>
    </nav>
    <!-- 언어 선택 -->
    <div id="lang-switch">
      <button onclick="setLang('en')">English</button>
      <button onclick="setLang('ko')">한국어</button>
      <button onclick="setLang('zh')">中文</button>
      <button onclick="setLang('ja')">日本語</button>
    </div>
  </header>

  <main style="display:grid; grid-template-columns:1fr 1fr; gap:2rem;">
    <section>
      <h2 id="eurusd-title">EUR/USD</h2>
      <div id="eurusd-chart"></div>
      <script>
        new TradingView.widget({
          "width": "100%",
          "height": 400,
          "symbol": "FX:EURUSD",
          "interval": "30",
          "timezone": "Asia/Seoul",
          "theme": "dark",
          "style": "1",
          "locale": "en",
          "container_id": "eurusd-chart"
        });
      </script>
    </section>

    <section>
      <h2 id="usdjpy-title">USD/JPY</h2>
      <div id="usdjpy-chart"></div>
      <script>
        new TradingView.widget({
          "width": "100%",
          "height": 400,
          "symbol": "FX:USDJPY",
          "interval": "30",
          "timezone": "Asia/Seoul",
          "theme": "dark",
          "style": "1",
          "locale": "en",
          "container_id": "usdjpy-chart"
        });
      </script>
    </section>

    <section style="grid-column:1 / span 2;">
      <h2 id="forex-news">Forex News Feed</h2>
      <div style="background:#161b22; padding:1rem;">
        [API 연동 자리: Investing.com 스타일 외환 뉴스 자동 표시]
      </div>
    </section>

    <section style="grid-column:1 / span 2;">
      <h2 id="poly-title">Prediction Market Indicators</h2>
      <div style="background:#161b22; padding:1rem;">
        [Polymarket API 연동 자리: EUR/USD, USD/JPY 관련 확률 기반 보조지표]
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 GlobalEdge. All rights reserved.</p>
  </footer>

  <script>
    // 다국어 지원
    const translations = {
      en: {
        "eurusd-title": "EUR/USD",
        "usdjpy-title": "USD/JPY",
        "forex-news": "Forex News Feed",
        "poly-title": "Prediction Market Indicators"
      },
      ko: {
        "eurusd-title": "유로/달러 (EUR/USD)",
        "usdjpy-title": "달러/엔 (USD/JPY)",
        "forex-news": "외환 뉴스 피드",
        "poly-title": "예측시장 보조지표"
      },
      zh: {
        "eurusd-title": "欧元/美元 (EUR/USD)",
        "usdjpy-title": "美元/日元 (USD/JPY)",
        "forex-news": "外汇新闻",
        "poly-title": "预测市场指标"
      },
      ja: {
        "eurusd-title": "ユーロ/ドル (EUR/USD)",
        "usdjpy-title": "ドル/円 (USD/JPY)",
        "forex-news": "外国為替ニュース",
        "poly-title": "予測市場指標"
      }
    };

    function setLang(lang) {
      for (const id in translations[lang]) {
        document.getElementById(id).innerText = translations[lang][id];
      }
    }
  </script>
</body>
</html>
