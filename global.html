<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Data - GlobalEdge</title>
  <meta name="description" content="Global economic indicators including commodities and bond yields">
  <link rel="stylesheet" href="style.css">
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
  <header>
    <h1>🌍 Global Economic Data</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="crypto.html">Crypto</a>
      <a href="forex.html">Forex</a>
      <a href="market.html">Markets</a>
      <a href="predict.html">Predict</a>
      <a href="sentiment.html">Sentiment</a>
      <a href="news.html">News</a>
      <a href="analysis.html">Analysis</a>
      <a href="calculator.html">Calculator</a>
    </nav>
    <!-- 언어 선택 -->
    <div id="lang-switch">
      <button onclick="setLang('en')">English</button>
      <button onclick="setLang('ko')">한국어</button>
      <button onclick="setLang('zh')">中文</button>
      <button onclick="setLang('ja')">日本語</button>
    </div>
  </header>

  <main style="display:grid; grid-template-columns:1fr 1fr; gap:2rem;">
    <section>
      <h2 id="gold-title">Gold (XAU/USD)</h2>
      <div id="gold-chart"></div>
      <script>
        new TradingView.widget({
          "width": "100%",
          "height": 400,
          "symbol": "OANDA:XAUUSD",
          "interval": "30",
          "timezone": "Asia/Seoul",
          "theme": "dark",
          "style": "1",
          "locale": "en",
          "container_id": "gold-chart"
        });
      </script>
    </section>

    <section>
      <h2 id="oil-title">Crude Oil (WTI)</h2>
      <div id="oil-chart"></div>
      <script>
        new TradingView.widget({
          "width": "100%",
          "height": 400,
          "symbol": "NYMEX:CL1!",
          "interval": "30",
          "timezone": "Asia/Seoul",
          "theme": "dark",
          "style": "1",
          "locale": "en",
          "container_id": "oil-chart"
        });
      </script>
    </section>

    <section>
      <h2 id="bond-title">US 10Y Treasury Yield</h2>
      <div id="us10y-chart"></div>
      <script>
        new TradingView.widget({
          "width": "100%",
          "height": 400,
          "symbol": "TVC:US10Y",
          "interval": "30",
          "timezone": "Asia/Seoul",
          "theme": "dark",
          "style": "1",
          "locale": "en",
          "container_id": "us10y-chart"
        });
      </script>
    </section>

    <section style="grid-column:1 / span 2;">
      <h2 id="global-news">Global Market News</h2>
      <div style="background:#161b22; padding:1rem;">
        [API 연동 자리: Investing.com 스타일 글로벌 경제 뉴스 자동 표시]
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 GlobalEdge. All rights reserved.</p>
  </footer>

  <script>
    // 다국어 지원
    const translations = {
      en: {
        "gold-title": "Gold (XAU/USD)",
        "oil-title": "Crude Oil (WTI)",
        "bond-title": "US 10Y Treasury Yield",
        "global-news": "Global Market News"
      },
      ko: {
        "gold-title": "금 (XAU/USD)",
        "oil-title": "원유 (WTI)",
        "bond-title": "미국채 10년물 금리",
        "global-news": "글로벌 시장 뉴스"
      },
      zh: {
        "gold-title": "黄金 (XAU/USD)",
        "oil-title": "原油 (WTI)",
        "bond-title": "美国10年期国债收益率",
        "global-news": "全球市场新闻"
      },
      ja: {
        "gold-title": "金 (XAU/USD)",
        "oil-title": "原油 (WTI)",
        "bond-title": "米国10年債利回り",
        "global-news": "グローバル市場ニュース"
      }
    };

    function setLang(lang) {
      for (const id in translations[lang]) {
        document.getElementById(id).innerText = translations[lang][id];
      }
    }
  </script>
</body>
</html>
