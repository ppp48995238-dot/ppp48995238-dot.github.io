<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Global Market Indices</title>
</head>
<body>
    <div class="header">
        <h1>GLOBAL MARKET INDICES</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
        <a href="global.html" class="tab-link active">세계지수</a>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>🌎 주요 국가 지수 및 원자재 현황</h2>
            <div id="global-market" class="widget-box" style="min-height: 850px;"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "container_id": "global-market",
            "width": "100%", "height": "850",
            "symbolsGroups": [
                { "name": "미국 증시", "symbols": [ {"s": "SP:SPX"}, {"s": "NASDAQ:NDX"}, {"s": "INDEX:DJI"} ] },
                { "name": "아시아/유럽", "symbols": [ {"s": "INDEX:NKY"}, {"s": "INDEX:DAX"}, {"s": "KRX:KOSPI"} ] },
                { "name": "원자재/에너지", "symbols": [ {"s": "TVC:GOLD"}, {"s": "TVC:USOIL"}, {"s": "TVC:SILVER"} ] }
            ],
            "showSymbolLogo": true, "colorTheme": "dark", "locale": "kr"
        });
    </script>
</body>
</html>
