<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Quant Calculator | 퀀트 계산기</title>
</head>
<body>
    <div class="header">
        <h1>QUANT RISK CALCULATOR</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
        <a href="global.html" class="tab-link">세계지수</a>
        <a href="analysis.html" class="tab-link">종목진단</a>
        <a href="predict.html" class="tab-link">예측시장</a>
        <a href="calculator.html" class="tab-link active">퀀트계산기</a>
    </div>

    <div class="dashboard">
        <div class="card half">
            <h2>🛡️ 포지션 사이징 (Kelly Criterion)</h2>
            <div style="margin-bottom:15px;">
                <label>총 자본금:</label>
                <input type="number" id="capital" placeholder="자본금 입력" style="width:100%; padding:10px; background:#222; border:1px solid #444; color:#fff;">
            </div>
            <div style="margin-bottom:15px;">
                <label>허용 손절폭 (%):</label>
                <input type="number" id="stopLoss" placeholder="진입가 대비 손절 %" style="width:100%; padding:10px; background:#222; border:1px solid #444; color:#fff;">
            </div>
            <button onclick="calculate()" style="width:100%; padding:15px; background:#2962ff; color:#fff; border:none; cursor:pointer; font-weight:bold;">비중 계산하기</button>
            <div id="result" style="margin-top:20px; padding:15px; background:#000; border-left:4px solid #2962ff;">
                <p id="resText">자본금과 손절폭을 입력하고 계산해봐!</p>
            </div>
        </div>

        <div class="card half">
            <h2>💡 설명</h2>
            <p style="line-height:1.6; color:#a0a0a0;">
                이 계산기는 <b>켈리 공식(Kelly Criterion)</b>을 변형하여, 1회 매매 시 전체 자본의 일정 비율(보통 1~2%)만 리스크에 노출되도록 설계되었어.<br><br>
                손절폭이 깊을수록 투입 비중을 줄여서 자산을 방어하는 게 퀀트 투자의 핵심이야.
            </p>
        </div>
    </div>

    <script>
        function calculate() {
            const cap = document.getElementById('capital').value;
            const stop = document.getElementById('stopLoss').value;
            const riskPerTrade = cap * 0.02; // 2% 리스크 제한
            const positionSize = riskPerTrade / (stop / 100);
            document.getElementById('resText').innerHTML = 
                `<strong>적정 투입 금액:</strong> ${Math.floor(positionSize).toLocaleString()}원<br>` +
                `<strong>최대 손실 제한:</strong> ${Math.floor(riskPerTrade).toLocaleString()}원`;
        }
    </script>
</body>
</html>
