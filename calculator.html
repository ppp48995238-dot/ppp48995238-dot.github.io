<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investment Calculator - GlobalEdge</title>
  <meta name="description" content="투자 수익률 계산기">
  <link rel="stylesheet" href="style.css">
  <script>
    function calculateROI() {
      const initial = parseFloat(document.getElementById("initial").value);
      const final = parseFloat(document.getElementById("final").value);
      if (isNaN(initial) || isNaN(final) || initial <= 0) {
        alert("올바른 값을 입력하세요.");
        return;
      }
      const roi = ((final - initial) / initial) * 100;
      document.getElementById("result").innerText = "수익률: " + roi.toFixed(2) + "%";
    }
  </script>
</head>
<body>
  <header>
    <h1>Investment Calculator</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="crypto.html">Crypto</a>
      <a href="forex.html">Forex</a>
      <a href="market.html">Markets</a>
      <a href="predict.html">Predict</a>
      <a href="sentiment.html">Sentiment</a>
      <a href="news.html">News</a>
      <a href="global.html">Global</a>
      <a href="analysis.html">Analysis</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>투자 수익률 계산기</h2>
      <form onsubmit="event.preventDefault(); calculateROI();">
        <label for="initial">초기 투자금액 (₩):</label><br>
        <input type="number" id="initial" required><br><br>

        <label for="final">최종 금액 (₩):</label><br>
        <input type="number" id="final" required><br><br>

        <button type="submit">계산하기</button>
      </form>
      <p id="result" style="margin-top:1rem; font-weight:bold;"></p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 GlobalEdge. All rights reserved.</p>
  </footer>
</body>
</html>
