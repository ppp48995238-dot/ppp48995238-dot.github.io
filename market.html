<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Technical Analysis | 전문 차트</title>
</head>
<body>
    <div class="header">
        <h1>TECHNICAL ANALYSIS</h1>
        <div id="tv-search-container" style="width: 100%; max-width: 600px; margin: 0 auto;"></div>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link active">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>📈 실시간 종목 차트 & 검색</h2>
            <div id="tradingview-chart" class="widget-box"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // 1. 차트 위젯
        new TradingView.widget({
            "container_id": "tradingview-chart",
            "width": "100%", "height": "600",
            "symbol": "NASDAQ:AAPL",
            "interval": "D", "timezone": "Asia/Seoul", "theme": "dark",
            "style": "1", "locale": "kr", "toolbar_bg": "#f1f3f6",
            "enable_publishing": false, "allow_symbol_change": true,
            "details": true, "hotlist": true, "calendar": true
        });
    </script>
</body>
</html>
