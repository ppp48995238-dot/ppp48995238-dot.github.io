<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Global Markets Dashboard - Stocks Forex Commodities</title>

<meta name="description" content="Live global markets: S&P500, Nasdaq, Gold, Oil, Forex and economic indices.">

<link rel="stylesheet" href="style.css">

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }

.topbar {
  padding:20px;
  text-align:center;
  background:#111827;
}

.menu {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#1f2937;
}

.menu a {
  color:white;
  text-decoration:none;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:12px;
}

iframe {
  width:100%;
  height:300px;
  border:none;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="topbar">
<h1>📊 Global Markets</h1>
<p>Stocks • Forex • Commodities • Indices</p>
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="crypto.html">Crypto</a>
<a href="market.html">Markets</a>
<a href="news.html">News</a>
<a href="predict.html">Predict</a>
</div>

<div class="grid">

<div class="card">
<h3>S&P 500</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=SPX&interval=D&theme=dark"></iframe>
</div>

<div class="card">
<h3>NASDAQ</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:AAPL&interval=D&theme=dark"></iframe>
</div>

<div class="card">
<h3>Gold</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=60&theme=dark"></iframe>
</div>

<div class="card">
<h3>Oil (WTI)</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC:USOIL&interval=60&theme=dark"></iframe>
</div>

<div class="card">
<h3>DXY (Dollar Index)</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC:DXY&interval=D&theme=dark"></iframe>
</div>

</div>

</body>
</html>
