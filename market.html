<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Technical Analysis Terminal</title>
</head>
<body>
    <div class="header">
        <h1>TECHNICAL ANALYSIS TERMINAL</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
        <a href="forex.html" class="tab-link">환율</a>
        <a href="sentiment.html" class="tab-link">공포지수</a>
        <a href="global.html" class="tab-link">세계지수</a>
        <a href="analysis.html" class="tab-link">종목진단</a>
        <a href="predict.html" class="tab-link">예측시장</a>
        <a href="calculator.html" class="tab-link">퀀트계산기</a>
    </div>

    <div class="dashboard">
        <div class="card" style="grid-column: span 2;">
            <h2>📈 종목 검색 및 기술적 차트 (검색창 내장)</h2>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                {
                    "width": "100%",
                    "height": "700",
                    "symbol": "NASDAQ:AAPL",
                    "interval": "D",
                    "timezone": "Asia/Seoul",
                    "theme": "dark",
                    "style": "1",
                    "locale": "kr",
                    "allow_symbol_change": true,
                    "calendar": true,
                    "support_host": "https://www.tradingview.com"
                }
                </script>
            </div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h2>🔥 S&P 500 섹터별 히트맵</h2>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
                {
                    "exchange": "US",
                    "dataSource": "SPX500",
                    "grouping": "sector",
                    "filled": true,
                    "colorTheme": "dark",
                    "rows": 15,
                    "cols": 25,
                    "width": "100%",
                    "height": "700"
                }
                </script>
            </div>
        </div>
    </div>
</body>
</html>
