<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Crypto Market Live - Prices, Charts, Rankings</title>
<meta name="description" content="Live cryptocurrency prices, rankings, market cap, and charts like TradingView. Bitcoin, Ethereum and altcoins live data.">

<link rel="stylesheet" href="style.css">

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }

.topbar { padding:20px; text-align:center; background:#111827; }
.menu { display:flex; justify-content:center; gap:10px; padding:10px; background:#1f2937; }
.menu a { color:white; text-decoration:none; }

.searchBox {
  text-align:center;
  margin:15px;
}

input {
  padding:10px;
  width:60%;
  border-radius:10px;
  border:none;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:12px;
}

.green { color:#22c55e; }
.red { color:#ef4444; }

iframe {
  width:100%;
  height:300px;
  border:none;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="topbar">
<h1>₿ Crypto Market Live</h1>
<p>Real-time prices, charts, rankings (CoinGecko powered)</p>
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="crypto.html">Crypto</a>
<a href="market.html">Markets</a>
<a href="news.html">News</a>
<a href="predict.html">Predict</a>
</div>

<div class="searchBox">
<input type="text" id="search" placeholder="Search coin (bitcoin, ethereum...)">
</div>

<div class="grid" id="coins"></div>

<div class="card" style="margin:20px;">
<h2>📊 Bitcoin Chart (Live)</h2>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=60&theme=dark"></iframe>
</div>

<script>

let allCoins = [];

async function loadCoins() {

  const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=1");
  const data = await res.json();

  allCoins = data;

  render(data);
}

function render(data) {

  const container = document.getElementById("coins");
  container.innerHTML = "";

  data.forEach(c => {

    const change = c.price_change_percentage_24h;
    const color = change >= 0 ? "green" : "red";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${c.market_cap_rank}. ${c.name}</h3>
      <p>Price: $${c.current_price.toLocaleString()}</p>
      <p class="${color}">24h: ${change.toFixed(2)}%</p>
      <p>Market Cap: $${c.market_cap.toLocaleString()}</p>
      <p>Volume: $${c.total_volume.toLocaleString()}</p>
    `;

    container.appendChild(div);
  });
}

// SEARCH FILTER
document.getElementById("search").addEventListener("input", function(e){

  const value = e.target.value.toLowerCase();

  const filtered = allCoins.filter(c =>
    c.name.toLowerCase().includes(value) ||
    c.symbol.toLowerCase().includes(value)
  );

  render(filtered);
});

loadCoins();
setInterval(loadCoins, 60000);

</script>

</body>
</html>
