<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Market Sentiment | 공포 & 탐욕 지수</title>
</head>
<body>
    <div class="header">
        <h1>MARKET SENTIMENT & VOLATILITY</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
        <a href="forex.html" class="tab-link">환율</a>
        <a href="sentiment.html" class="tab-link">공포지수</a>
        <a href="global.html" class="tab-link">세계지수</a>
        <a href="analysis.html" class="tab-link">종목진단</a>
        <a href="predict.html" class="tab-link">예측시장</a>
        <a href="calculator.html" class="tab-link">퀀트계산기</a>
    </div>

    <div class="dashboard">
        <div class="card" style="grid-column: span 2;">
            <h2>😨 변동성 지수 (VIX) - 시장의 공포 체감도</h2>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                {
                    "symbol": "CBOE:VIX",
                    "interval": "D",
                    "timezone": "Asia/Seoul",
                    "theme": "dark",
                    "style": "1",
                    "locale": "kr",
                    "width": "100%",
                    "height": "600",
                    "allow_symbol_change": false,
                    "details": true,
                    "calendar": true
                }
                </script>
            </div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h2>📊 주요 지수 기술적 심리 분석</h2>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "height": "600",
                    "symbol": "NASDAQ:NDX",
                    "showIntervalTabs": true,
                    "displayMode": "single",
                    "locale": "kr",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>
    </div>
</body>
</html>
