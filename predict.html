<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Prediction & Sentiment</title>
</head>
<body>
    <div class="header">
        <h1>PREDICTION & SENTIMENT</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
        <a href="global.html" class="tab-link">세계지수</a>
        <a href="analysis.html" class="tab-link">종목진단</a>
        <a href="predict.html" class="tab-link active">예측시장</a>
    </div>

    <div class="dashboard">
        <div class="card half">
            <h2>🐂 시장 참여자 심리 (Long/Short Gauge)</h2>
            <div id="sentiment-gauge" class="widget-box" style="min-height: 450px;"></div>
        </div>
        
        <div class="card half">
            <h2>🎯 거시 경제 이벤트 예측</h2>
            <div id="event-calendar" class="widget-box" style="min-height: 450px;"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // 1. 기술적 분석 (심리 게이지)
        new TradingView.widget({
            "container_id": "sentiment-gauge",
            "width": "100%", "height": "450",
            "symbol": "NASDAQ:AAPL",
            "interval": "1D", "theme": "dark", "locale": "kr",
            "allow_symbol_change": true, "showIntervalTabs": true
        });

        // 2. 경제 캘린더
        new TradingView.widget({
            "container_id": "event-calendar",
            "width": "100%", "height": "450",
            "colorTheme": "dark", "locale": "kr",
            "importanceFilter": "0,1"
        });
    </script>
</body>
</html>
