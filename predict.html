<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Prediction Terminal | 예측시장</title>
</head>
<body>
    <div class="header">
        <h1>PREDICTION & SENTIMENT TERMINAL</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
        <a href="forex.html" class="tab-link">환율</a>
        <a href="sentiment.html" class="tab-link">공포지수</a>
        <a href="global.html" class="tab-link">세계지수</a>
        <a href="analysis.html" class="tab-link">종목진단</a>
        <a href="predict.html" class="tab-link">예측시장</a>
        <a href="calculator.html" class="tab-link">퀀트계산기</a>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>🐂 테슬라(TSLA) 롱/숏 심리 비율</h2>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": false,
                    "height": "450",
                    "symbol": "NASDAQ:TSLA",
                    "showIntervalTabs": true,
                    "displayMode": "single",
                    "locale": "kr",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card">
            <h2>🐻 비트코인(BTC) 롱/숏 심리 비율</h2>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": false,
                    "height": "450",
                    "symbol": "BINANCE:BTCUSDT",
                    "showIntervalTabs": true,
                    "displayMode": "single",
                    "locale": "kr",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h2>🎯 글로벌 경제 이벤트 예측 (Polymarket 베팅 근거 데이터)</h2>
            <p style="margin-bottom: 15px; color: #888;">금리 결정, GDP 발표 등 예측 시장 참여자들이 가장 주목하는 실시간 경제 지표 일정입니다.</p>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                {
                    "colorTheme": "dark",
                    "isTransparent": false,
                    "width": "100%",
                    "height": "600",
                    "locale": "kr",
                    "importanceFilter": "0,1",
                    "currencyFilter": "USD,EUR,JPY,GBP,KRW"
                }
                </script>
            </div>
        </div>
    </div>
</body>
</html>
