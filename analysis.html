<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Stock Analysis Terminal</title>
</head>
<body>
    <div class="header">
        <h1>STOCK RESEARCH TERMINAL</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
        <a href="global.html" class="tab-link">세계지수</a>
        <a href="analysis.html" class="tab-link active">종목진단</a>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>🔎 종목 검색 및 심층 진단</h2>
            <div id="stock-info" class="widget-box" style="min-height: 400px;"></div>
        </div>
        
        <div class="card">
            <h2>📊 핵심 재무 데이터 (Fundamental)</h2>
            <div id="financial-data" class="widget-box" style="min-height: 600px;"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // 1. 종목 상세 정보 (검색창 내장)
        new TradingView.widget({
            "container_id": "stock-info",
            "width": "100%", "height": "400",
            "symbol": "NASDAQ:AAPL",
            "theme": "dark", "locale": "kr",
            "allow_symbol_change": true
        });

        // 2. 재무제표 요약
        new TradingView.widget({
            "container_id": "financial-data",
            "width": "100%", "height": "600",
            "symbol": "NASDAQ:AAPL",
            "colorTheme": "dark", "locale": "kr",
            "isTransparent": false
        });
    </script>
</body>
</html>
