<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Live Crypto & Financial News - Bitcoin Stock Market Updates</title>

<meta name="description" content="Live financial news updates on Bitcoin, crypto, stocks, forex and global markets. Real-time headlines and analysis.">

<link rel="stylesheet" href="style.css">

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }

.topbar {
  padding:20px;
  text-align:center;
  background:#111827;
}

.menu {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#1f2937;
}

.menu a {
  color:white;
  text-decoration:none;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:12px;
}

a {
  color:#60a5fa;
  text-decoration:none;
}

small {
  color:#9ca3af;
}
</style>

</head>

<body>

<div class="topbar">
<h1>📰 Live Financial News</h1>
<p>Bitcoin • Crypto • Stocks • Global Markets</p>
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="crypto.html">Crypto</a>
<a href="market.html">Markets</a>
<a href="news.html">News</a>
<a href="predict.html">Predict</a>
</div>

<div class="grid" id="news"></div>

<script>

async function loadNews() {

  const rss = "https://api.rss2json.com/v1/api.json?rss_url=" +
              encodeURIComponent("https://www.coindesk.com/arc/outboundfeeds/rss/");

  const res = await fetch(rss);
  const data = await res.json();

  const container = document.getElementById("news");
  container.innerHTML = "";

  data.items.slice(0, 12).forEach(n => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${n.title}</h3>
      <small>${new Date(n.pubDate).toLocaleString()}</small>
      <p>${n.description ? n.description.slice(0,120) : ""}...</p>
      <a href="${n.link}" target="_blank">Read Full Article →</a>
    `;

    container.appendChild(div);
  });
}

loadNews();
setInterval(loadNews, 120000);

</script>

</body>
</html>
