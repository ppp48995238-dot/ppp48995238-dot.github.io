<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Earnings & Economic Calendar</title>
</head>
<body>
    <div class="header">
        <h1>ECONOMIC & EARNINGS CALENDAR</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link active">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
    </div>

    <div class="dashboard">
        <div class="card half">
            <h2>📅 주요 기업 실적 발표</h2>
            <div id="earnings-widget" class="widget-box"></div>
        </div>
        
        <div class="card half">
            <h2>🌎 글로벌 경제 이벤트</h2>
            <div id="economic-widget" class="widget-box"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // 1. 실적 발표 위젯
        new TradingView.widget({
            "container_id": "earnings-widget",
            "width": "100%", "height": "700",
            "colorTheme": "dark", "locale": "kr",
            "calendar_type": "earnings"
        });

        // 2. 경제 이벤트 위젯
        new TradingView.widget({
            "container_id": "economic-widget",
            "width": "100%", "height": "700",
            "colorTheme": "dark", "locale": "kr",
            "importanceFilter": "0,1",
            "calendar_type": "economic"
        });
    </script>
</body>
</html>
