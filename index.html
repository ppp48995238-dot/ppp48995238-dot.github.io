<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Global Finance Dashboard</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        h2 { margin: 0 0 15px 0; font-size: 18px; color: #ffffff; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🔥 시장 히트맵 (S&P 500)</h2>
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
            { "dataSource": "SPX500", "blockSize": "market_cap_basic", "blockColor": "change", "locale": "ko", "colorTheme": "dark" }
            </script>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>📈 나스닥 100 기술적 분석</h2>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                { "symbol": "NASDAQ:NDX", "theme": "dark", "height": "500", "autosize": true, "locale": "ko" }
                </script>
            </div>
        </div>
        <div class="card">
            <h2>📰 실시간 글로벌 경제 뉴스</h2>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                { "feedMode": "market", "market": "stock", "colorTheme": "dark", "height": "500", "autosize": true, "locale": "ko" }
                </script>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>🗓️ 금주 주요 경제 일정</h2>
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
            { "width": "100%", "height": "500", "colorTheme": "dark", "locale": "ko", "importanceImp": ["0", "1"], "currencyFilter": "USD" }
            </script>
        </div>
    </div>
</div>

</body>
</html>
