<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 파이낸스 대시보드</title>
    
    <meta name="google-adsense-account" content="ca-pub-6866596388873889">
    
    <style>
        :root {
            --bg-color: #0c1017;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        header h1 {
            font-size: 24px;
            color: #ffffff;
            margin: 0;
        }
        .btn-calc {
            background-color: var(--accent-color);
            color: #ffffff;
            padding: 10px 16px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .btn-calc:hover {
            opacity: 0.9;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            overflow: hidden;
        }
        .card h2 {
            font-size: 18px;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .widget-container {
            height: 500px;
            width: 100%;
        }
        .full-width-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>📊 GLOBAL FINANCE DASHBOARD</h1>
        <a href="https://ppp48995238-dot.github.io/calculator-site/" class="btn-calc">🧮 금융/재테크 계산기 바로가기</a>
    </header>

    <div style="margin-bottom: 20px;">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
            "symbols": [
                { "proName": "FOREXCOM:SPXUSD", "title": "S&P 500" },
                { "proName": "FOREXCOM:NSXUSD", "title": "Nasdaq 100" },
                { "proName": "FX_IDC:USDKRW", "title": "USD/KRW 환율" },
                { "proName": "BITSTAMP:BTCUSD", "title": "Bitcoin" },
                { "proName": "COMEX:GC1!", "title": "Gold" }
            ],
            "showSymbolLogo": true,
            "isTransparent": false,
            "displayMode": "adaptive",
            "colorTheme": "dark"
            }
            </script>
        </div>
    </div>

    <div class="grid-container">
        <div class="card">
            <h2>📈 실시간 글로벌 마켓 종합 차트</h2>
            <div class="widget-container">
                <div class="tradingview-widget-container" style="height:100%;width:100%;">
                    <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%;"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                    {
                    "autosize": true,
                    "symbol": "NASDAQ:IXIC",
                    "interval": "D",
                    "timezone": "Asia/Seoul",
                    "theme": "dark",
                    "style": "1",
                    "locale": "ko",
                    "allow_symbol_change": true,
                    "calendar": false,
                    "support_host": "https://www.tradingview.com"
                    }
                    </script>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📰 글로벌 경제 타임라인 (실시간 뉴스)</h2>
            <div class="widget-container" style="height: 500px; overflow-y: auto;">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    {
                    "feedMode": "all_symbols",
                    "isTransparent": false,
                    "displayMode": "regular",
                    "width": "100%",
                    "height": "100%",
                    "colorTheme": "dark",
                    "locale": "ko"
                    }
                    </script>
                </div>
            </div>
        </div>
    </div>

    <div class="full-width-card">
        <h2>📊 대형 기관 투자자 자금 동향 (CFTC COT 순포지션)</h2>
        <div style="height: 400px; width: 100%;">
            <div class="tradingview-widget-container" style="height:100%;width:100%;">
                <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                {
                "autosize": true,
                "symbol": "CFTC:NQ1!_NET_L",
                "interval": "W",
                "timezone": "Asia/Seoul",
                "theme": "dark",
                "style": "3",
                "locale": "ko",
                "allow_symbol_change": false,
                "calendar": false,
                "support_host": "https://www.tradingview.com"
                }
                </script>
            </div>
        </div>
        <p style="font-size: 12px; color: #8b949e; margin-top: 10px;">* 미국 상품선물거래위원회(CFTC)가 매주 발표하는 나스닥 100 선물 대형 헤지펀드 및 상업 세력들의 순 포지션 누적 지표입니다. 세력들의 매수/매도 강도를 파악하는 데 용이합니다.</p>
    </div>

</body>
</html>
