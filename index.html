<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Finance Hub | 실시간 금융 대시보드</title>
    <style>
        body { background-color: #0c1017; color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; }
        h2 { font-size: 16px; color: #ffffff; margin-bottom: 10px; }
        .btn-calc { display: block; text-align: center; background: #58a6ff; color: white; padding: 12px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

    <a href="https://ppp48995238-dot.github.io/calculator-site/" class="btn-calc">🧮 재테크 계산기 도구 모음 바로가기</a>

    <div class="grid">
        <div class="card">
            <h2>😨 시장 공포-탐욕 지수</h2>
            <script src="https://fearandgreed.top/widget.js"></script>
        </div>

        <div class="card">
            <h2>📈 나스닥 실시간 차트</h2>
            <div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
            { "symbol": "NASDAQ:IXIC", "theme": "dark", "height": "300", "autosize": true }
            </script></div>
        </div>

        <div class="card">
            <h2>💰 투자 손익 간편 계산기</h2>
            <input type="number" id="p" placeholder="매수가" style="width:90%; padding:8px; margin-bottom:5px;">
            <input type="number" id="q" placeholder="수량" style="width:90%; padding:8px; margin-bottom:5px;">
            <button onclick="calc()" style="width:95%; padding:10px; background:#2ea043; color:white; border:none; cursor:pointer;">계산하기</button>
            <p id="res" style="margin-top:10px;"></p>
        </div>
    </div>

    <div class="card" style="margin-top: 15px;">
        <h2>🗓️ 금주 주요 경제 일정</h2>
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
            { "width": "100%", "height": "400", "colorTheme": "dark", "locale": "ko", "currencyFilter": "USD" }
            </script>
        </div>
    </div>

    <script>
        function calc() {
            let p = document.getElementById('p').value;
            let q = document.getElementById('q').value;
            document.getElementById('res').innerText = "총액: " + (p * q).toLocaleString() + " 원";
        }
    </script>
</body>
</html>
