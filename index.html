<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Global Finance Terminal</title>
</head>
<body>
    <div class="header">
        <h1>GLOBAL FINANCE TERMINAL</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link active">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
        <a href="global.html" class="tab-link">세계지수</a>
        <a href="analysis.html" class="tab-link">종목진단</a>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>📊 시장 종합 실시간 지표</h2>
            <div id="market-overview" class="widget-box"></div>
        </div>

        <div class="card">
            <h2>📰 실시간 경제 뉴스 & 이슈</h2>
            <div id="news-timeline" class="widget-box"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // 시장 종합
        new TradingView.widget({
            "container_id": "market-overview",
            "width": "100%", "height": "600",
            "symbols": [ {"s": "SP:SPX"}, {"s": "NASDAQ:NDX"}, {"s": "INDEX:DJI"}, {"s": "KRX:KOSPI"} ],
            "theme": "dark", "locale": "kr", "allow_symbol_change": true
        });
        // 뉴스
        new TradingView.widget({
            "container_id": "news-timeline",
            "width": "100%", "height": "800",
            "feedMode": "all_symbols", "colorTheme": "dark", "locale": "kr"
        });
    </script>
</body>
</html>
