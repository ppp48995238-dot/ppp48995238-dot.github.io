<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Global Finance Live Dashboard - Stocks Crypto Markets</title>
<meta name="description" content="Live Bitcoin, Ethereum, stock market prices, global financial news and crypto sentiment dashboard.">

<link rel="stylesheet" href="style.css">

<style>
.card { background:#111827; padding:15px; border-radius:12px; color:white; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; padding:20px; }
body { margin:0; font-family:Arial; background:#0b1220; color:white; }
.topbar { padding:20px; text-align:center; background:#111827; }
.menu { display:flex; justify-content:center; gap:15px; background:#1f2937; padding:10px; }
.menu a { color:white; text-decoration:none; }
.ad { background:#1e293b; padding:20px; text-align:center; }
</style>

</head>

<body>

<div class="topbar">
<h1>📊 Global Finance Live</h1>
<p>Real-time Crypto • Stocks • Market Sentiment</p>
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="crypto.html">Crypto</a>
<a href="market.html">Markets</a>
<a href="news.html">News</a>
<a href="predict.html">Predict</a>
</div>

<div class="grid">

<div class="card">
<h2>₿ Bitcoin</h2>
<h3 id="btc">Loading...</h3>
</div>

<div class="card">
<h2>Ξ Ethereum</h2>
<h3 id="eth">Loading...</h3>
</div>

<div class="card">
<h2>📊 Fear & Greed</h2>
<h3 id="fear">Loading...</h3>
</div>

<div class="card">
<h2>📈 Nasdaq (ETF Proxy)</h2>
<h3 id="nasdaq">Loading...</h3>
</div>

<div class="card">
<h2>📰 Latest Crypto Sentiment</h2>
<p id="sentiment">Loading...</p>
</div>

<div class="card ad">
<h3>Sponsored</h3>
<p>Ad Space (Google AdSense Ready)</p>
</div>

</div>

<script>
async function loadAll() {

  // CRYPTO PRICE
  const crypto = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd").then(r=>r.json());

  document.getElementById("btc").innerText = "$" + crypto.bitcoin.usd.toLocaleString();
  document.getElementById("eth").innerText = "$" + crypto.ethereum.usd.toLocaleString();

  // FEAR & GREED
  const fg = await fetch("https://api.alternative.me/fng/?limit=1").then(r=>r.json());
  document.getElementById("fear").innerText = fg.data[0].value + " (" + fg.data[0].value_classification + ")";

  // NASDAQ (ETF proxy SPY)
  const spy = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd").then(r=>r.json());
  document.getElementById("nasdaq").innerText = "Market tracking via SPY/Tech correlation";

  // SENTIMENT (simple derived logic)
  let sentimentText = "Neutral market conditions with mixed risk appetite.";
  if (fg.data[0].value < 30) sentimentText = "Extreme fear in market - potential oversold conditions.";
  if (fg.data[0].value > 70) sentimentText = "Extreme greed detected - possible correction risk.";

  document.getElementById("sentiment").innerText = sentimentText;

}

loadAll();
setInterval(loadAll, 60000);
</script>

</body>
</html>
