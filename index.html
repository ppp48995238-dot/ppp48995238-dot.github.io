<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Global Finance Terminal</title>
</head>
<body>
    <div class="header">
        <h1>GLOBAL FINANCE TERMINAL</h1>
    </div>

    <div class="tabs">
        <a href="index.html" class="tab-link">시장종합</a>
        <a href="market.html" class="tab-link">기술분석</a>
        <a href="news.html" class="tab-link">실적발표</a>
        <a href="crypto.html" class="tab-link">코인</a>
        <a href="forex.html" class="tab-link">환율</a>
        <a href="sentiment.html" class="tab-link">공포지수</a>
        <a href="global.html" class="tab-link">세계지수</a>
        <a href="analysis.html" class="tab-link">종목진단</a>
        <a href="predict.html" class="tab-link">예측시장</a>
        <a href="calculator.html" class="tab-link">퀀트계산기</a>
    </div>

    <div class="dashboard">
        <div class="card" style="grid-column: span 2;">
            <h2>📊 시장 종합 오버뷰 (실시간)</h2>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                {
                    "colorTheme": "dark",
                    "dateRange": "12M",
                    "showChart": true,
                    "locale": "kr",
                    "largeChartUrl": "",
                    "isTransparent": false,
                    "showSymbolLogo": true,
                    "showFloatingTooltip": true,
                    "width": "100%",
                    "height": "600",
                    "plotLineColorGrowing": "#2962FF",
                    "plotLineColorFalling": "#2962FF",
                    "tabs": [
                        { "title": "주요 지수", "symbols": [ {"s": "FOREXCOM:SPXUSD"}, {"s": "FOREXCOM:NSXUSD"}, {"s": "INDEX:DJI"}, {"s": "INDEX:NKY"}, {"s": "KRX:KOSPI"} ] },
                        { "title": "채권", "symbols": [ {"s": "CBOT:ZB1!"}, {"s": "CBOT:ZN1!"} ] }
                    ]
                }
                </script>
            </div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h2>📰 실시간 경제 뉴스 & 이슈</h2>
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {
                    "feedMode": "all_symbols",
                    "colorTheme": "dark",
                    "isTransparent": false,
                    "displayMode": "regular",
                    "width": "100%",
                    "height": "800",
                    "locale": "kr"
                }
                </script>
            </div>
        </div>
    </div>
</body>
</html>
