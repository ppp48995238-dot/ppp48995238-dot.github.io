<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Global Finance Terminal</title>
</head>
<body>
    <div class="navbar">
        <div class="dropdown"><a class="dropbtn">시장 ▼</a>
            <div class="dropdown-content"><a href="index.html">시장종합</a><a href="global.html">세계지수</a></div>
        </div>
        <div class="dropdown"><a class="dropbtn">분석 ▼</a>
            <div class="dropdown-content"><a href="market.html">기술분석</a><a href="analysis.html">종목진단</a></div>
        </div>
        <a href="news.html" class="dropbtn">뉴스</a>
        <a href="calculator.html" class="dropbtn">계산기</a>
    </div>

    <div class="dashboard" style="grid-template-columns: 2fr 1fr;">
        <div class="card">
            <h2>📊 실시간 주요 시장 지표</h2>
            <div id="market-quotes"></div>
        </div>
        <div class="card">
            <h2>📰 최신 경제 뉴스</h2>
            <div id="news-timeline"></div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
    {
      "width": "100%", "height": "700",
      "symbolsGroups": [
        { "name": "지수", "symbols": [{"s": "SP:SPX"}, {"s": "NASDAQ:NDX"}, {"s": "INDEX:DJI"}, {"s": "KRX:KOSPI"}] },
        { "name": "원자재", "symbols": [{"s": "TVC:GOLD"}, {"s": "TVC:USOIL"}] }
      ],
      "colorTheme": "dark", "locale": "kr"
    }
    </script>
    <script src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
    {
      "feedMode": "all_symbols", "colorTheme": "dark", "height": "700", "width": "100%", "locale": "kr"
    }
    </script>
</body>
</html>
